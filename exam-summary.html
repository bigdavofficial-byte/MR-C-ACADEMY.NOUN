<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function payNow(courseCode){

let email = document.getElementById("userEmail").value;

if(email === ""){
alert("Please enter your email");
return;
}

// ALL COURSES (IMPORTANT)
let available = [
'GST101','GST102','GST103','GST104','GST203','GST302',
'ECO101','ECO202','ECO303',

'ECO401','ECO402','ECO403',
'BUS201','BUS202',
'ACC201','ACC202',
'MKT201','MKT202','MKT402',
'ENT201','ENT202',
'ENG111','ENG113','ENG141','ENG162','ENG172',
'INR212','INR232','INR262',
'LIN111','LIN112',
'PHS818',
'MTH281','STT211',
'PED236',
'CRD124 SUMMARY'
];

if(!available.includes(courseCode)){
alert("Summary not available. Contact us on WhatsApp.");
window.open("https://wa.me/2349046023711", "_blank");
return;
}

// PAYSTACK
let handler = PaystackPop.setup({
key: 'pk_live_2d846c889ae79826e0a00a23e0b1afaaf4803339',
email: email,
amount: 100000, // ₦1000
currency: "NGN",
ref: 'txn_' + Date.now(),

metadata: {
custom_fields: [
{
display_name: "Course Code",
variable_name: "course_code",
value: courseCode
}
]
},

callback: function(response){

alert("Payment successful!");

// SAVE ACCESS
localStorage.setItem("paid_" + courseCode, "true");

// REDIRECT
window.location.href = "download.html?course=" + courseCode;

},

onClose: function(){
alert("Payment cancelled");
}

});

handler.openIframe();

}

// TOGGLE MORE
function toggleMore(){
let section = document.getElementById("moreSection");
let btn = document.getElementById("toggleBtn");

if(section.style.display === "none"){
section.style.display = "block";
btn.innerHTML = "Hide Summaries ▲";
}else{
section.style.display = "none";
btn.innerHTML = "Get More Summaries ▼";
}
}

// SEARCH
function searchSummary(){
let input = document.getElementById("summarySearch");
let filter = input.value.toUpperCase();
let li = document.querySelectorAll("#summaryList li");

li.forEach(item => {
let text = item.textContent || item.innerText;
item.style.display = text.toUpperCase().includes(filter) ? "" : "none";
});
}

</script>
